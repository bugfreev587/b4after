<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6D8"/>
      <stop offset="100%" stop-color="#EDD8C8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Face lower half outline -->
  <ellipse cx="400" cy="400" rx="220" ry="200" fill="#F0D0B8"/>

  <!-- Nose hint -->
  <ellipse cx="400" cy="215" rx="25" ry="15" fill="#E8C4A8"/>

  <!-- Lips - open smile -->
  <!-- Upper lip -->
  <path d="M280 310 Q340 290 400 305 Q460 290 520 310 Q500 325 400 330 Q300 325 280 310Z" fill="#D4716A"/>
  <!-- Lower lip -->
  <path d="M290 380 Q340 410 400 415 Q460 410 510 380 Q500 395 400 400 Q300 395 290 380Z" fill="#C4615A"/>

  <!-- Mouth opening -->
  <path d="M290 315 Q340 305 400 310 Q460 305 510 315 Q510 380 400 395 Q290 380 290 315Z" fill="#3A1515"/>

  <!-- Upper teeth row - yellowed, uneven -->
  <rect x="305" y="315" width="28" height="30" rx="4" fill="#E8D8A0" stroke="#D4C890" stroke-width="1"/>
  <rect x="336" y="313" width="26" height="32" rx="4" fill="#E0D098" stroke="#D4C890" stroke-width="1"/>
  <rect x="365" y="312" width="30" height="33" rx="4" fill="#E8D8A0" stroke="#D4C890" stroke-width="1"/>
  <rect x="398" y="312" width="30" height="33" rx="4" fill="#DCC888" stroke="#D4C890" stroke-width="1"/>
  <rect x="431" y="313" width="26" height="32" rx="4" fill="#E8D8A0" stroke="#D4C890" stroke-width="1"/>
  <rect x="460" y="315" width="28" height="30" rx="4" fill="#DCC888" stroke="#D4C890" stroke-width="1"/>

  <!-- Gap between teeth -->
  <line x1="335" y1="316" x2="335" y2="343" stroke="#3A1515" stroke-width="2"/>
  <line x1="364" y1="314" x2="364" y2="344" stroke="#3A1515" stroke-width="2"/>
  <line x1="397" y1="313" x2="397" y2="344" stroke="#3A1515" stroke-width="2.5"/>
  <line x1="430" y1="314" x2="430" y2="344" stroke="#3A1515" stroke-width="2"/>
  <line x1="459" y1="316" x2="459" y2="343" stroke="#3A1515" stroke-width="2"/>

  <!-- Lower teeth -->
  <rect x="320" y="365" width="24" height="25" rx="4" fill="#E0D098"/>
  <rect x="347" y="363" width="23" height="27" rx="4" fill="#E8D8A0"/>
  <rect x="373" y="362" width="25" height="28" rx="4" fill="#DCC888"/>
  <rect x="401" y="362" width="25" height="28" rx="4" fill="#E0D098"/>
  <rect x="429" y="363" width="23" height="27" rx="4" fill="#E8D8A0"/>
  <rect x="455" y="365" width="24" height="25" rx="4" fill="#DCC888"/>

  <!-- Stain spots -->
  <circle cx="375" cy="325" r="4" fill="#C4A860" opacity="0.5"/>
  <circle cx="440" cy="328" r="3" fill="#C4A860" opacity="0.4"/>
  <circle cx="415" cy="322" r="3.5" fill="#C4A860" opacity="0.45"/>
</svg>