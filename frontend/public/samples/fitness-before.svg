<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF0"/>
      <stop offset="100%" stop-color="#D0D4DE"/>
    </linearGradient>
  </defs>
  <!-- Gym background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="480" width="800" height="120" fill="#3A3A4A"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#2E2E3E" stroke-width="2"/>

  <!-- Mirror frame -->
  <rect x="200" y="40" width="400" height="420" rx="8" fill="#C0C0C0"/>
  <rect x="210" y="50" width="380" height="400" rx="4" fill="#E8ECF4" opacity="0.5"/>

  <!-- Person silhouette - less fit -->
  <!-- Head -->
  <circle cx="400" cy="130" r="35" fill="#888"/>
  <!-- Torso - wider, softer -->
  <path d="M360 165 Q340 200 335 260 Q330 320 350 360 L450 360 Q470 320 465 260 Q460 200 440 165 Z" fill="#888"/>
  <!-- Arms -->
  <path d="M335 190 Q310 210 290 280 Q285 300 295 300 Q310 300 320 260 Q330 230 340 210" fill="#888"/>
  <path d="M465 190 Q490 210 510 280 Q515 300 505 300 Q490 300 480 260 Q470 230 460 210" fill="#888"/>
  <!-- Legs -->
  <rect x="360" y="360" width="35" height="120" rx="10" fill="#888"/>
  <rect x="405" y="360" width="35" height="120" rx="10" fill="#888"/>

  <!-- Shorts -->
  <rect x="350" y="310" width="100" height="60" rx="4" fill="#666"/>

  <!-- T-shirt outline -->
  <path d="M345 170 L340 260 Q338 300 355 310 L445 310 Q462 300 460 260 L455 170" fill="none" stroke="#666" stroke-width="2"/>

  <!-- Dumbbells on floor -->
  <rect x="120" y="490" width="80" height="20" rx="4" fill="#555"/>
  <rect x="115" y="485" width="20" height="30" rx="3" fill="#666"/>
  <rect x="185" y="485" width="20" height="30" rx="3" fill="#666"/>

  <rect x="600" y="490" width="80" height="20" rx="4" fill="#555"/>
  <rect x="595" y="485" width="20" height="30" rx="3" fill="#666"/>
  <rect x="665" y="485" width="20" height="30" rx="3" fill="#666"/>
</svg>